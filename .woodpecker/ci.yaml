# cpufetch-rs — CI: format, lint, test, docs, security
# Triggers on push to main and pull requests (GitHub forge).
when:
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: fmt
    image: dhi.io/rust:1.94.0-debian13-dev
    environment:
      CARGO_HOME: /woodpecker/cache/cpufetch-rs/cargo
      RUSTUP_HOME: /woodpecker/cache/cpufetch-rs/rustup
    commands:
      - rustup toolchain install nightly --profile minimal --component rustfmt --no-self-update
      - cargo +nightly fmt --all --check
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch

  - name: clippy
    image: dhi.io/rust:1.94.0-debian13-dev
    environment:
      CARGO_HOME: /woodpecker/cache/cpufetch-rs/cargo
      RUSTUP_HOME: /woodpecker/cache/cpufetch-rs/rustup
      RUSTFLAGS: -D warnings
    commands:
      - cargo clippy --all-targets --all-features
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch

  - name: test
    image: dhi.io/rust:1.94.0-debian13-dev
    environment:
      CARGO_HOME: /woodpecker/cache/cpufetch-rs/cargo
      RUSTUP_HOME: /woodpecker/cache/cpufetch-rs/rustup
    commands:
      - cargo test --all-features
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch

  - name: docs
    image: dhi.io/rust:1.94.0-debian13-dev
    environment:
      CARGO_HOME: /woodpecker/cache/cpufetch-rs/cargo
      RUSTUP_HOME: /woodpecker/cache/cpufetch-rs/rustup
      RUSTDOCFLAGS: -D warnings
    commands:
      - cargo doc --no-deps --document-private-items --all-features
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch

  - name: audit
    image: dhi.io/rust:1.94.0-debian13-dev
    environment:
      CARGO_HOME: /woodpecker/cache/cpufetch-rs/cargo
      RUSTUP_HOME: /woodpecker/cache/cpufetch-rs/rustup
    commands:
      - cargo install cargo-audit --locked
      - cargo audit
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch

  - name: deny
    image: dhi.io/rust:1.94.0-debian13-dev
    environment:
      CARGO_HOME: /woodpecker/cache/cpufetch-rs/cargo
      RUSTUP_HOME: /woodpecker/cache/cpufetch-rs/rustup
    commands:
      - cargo install cargo-deny --locked
      - cargo deny check
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch
