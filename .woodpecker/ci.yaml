# cpufetch-rs — CI: format, lint, test, docs, security
# Triggers on push to main and pull requests (GitHub forge).
when:
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: fmt
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpufetch-rs/cargo
    commands:
      - cargo +nightly fmt --all --check
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch

  - name: clippy
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpufetch-rs/cargo
      RUSTFLAGS: -D warnings
    commands:
      - cargo clippy --all-targets --all-features
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch

  - name: test
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpufetch-rs/cargo
    commands:
      - cargo test --all-features
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch

  - name: docs
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpufetch-rs/cargo
      RUSTDOCFLAGS: -D warnings
    commands:
      - cargo doc --no-deps --document-private-items --all-features
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch

  - name: audit
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpufetch-rs/cargo
    commands:
      - cargo audit
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch

  - name: deny
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpufetch-rs/cargo
    commands:
      - cargo deny check
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch
