# cpufetch-rs — CI: format, lint, test, docs, security
# Triggers on push to main and pull requests (GitHub forge).
when:
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: fmt
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /home/ci/.cargo
      RUSTUP_HOME: /home/ci/.rustup
    commands:
      - cargo +nightly fmt --all --check

  - name: clippy
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /home/ci/.cargo
      RUSTUP_HOME: /home/ci/.rustup
      RUSTFLAGS: -D warnings
    commands:
      - cargo clippy --all-targets --all-features

  - name: test
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /home/ci/.cargo
      RUSTUP_HOME: /home/ci/.rustup
    commands:
      - cargo test --all-features

  - name: docs
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /home/ci/.cargo
      RUSTUP_HOME: /home/ci/.rustup
      RUSTDOCFLAGS: -D warnings
    commands:
      - cargo doc --no-deps --document-private-items --all-features

  - name: audit
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /home/ci/.cargo
      RUSTUP_HOME: /home/ci/.rustup
    commands:
      - cargo audit

  - name: deny
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /home/ci/.cargo
      RUSTUP_HOME: /home/ci/.rustup
    commands:
      - cargo deny check
