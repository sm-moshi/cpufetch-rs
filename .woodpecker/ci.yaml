# cpufetch-rs — Rust CI: format, lint, test, docs
# Triggers on push to main and pull requests (GitHub forge).
#
# TODO: add cargo-audit step once cargo-audit is available in a DHI image
when:
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: restore-cache
    failure: ignore
    image: meltwater/drone-cache:v1.4.0@sha256:f4429bda3e4f2af2cceb40deee10b8cc5613aae7c8b08ad15c54109cad7fa9a3
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      restore: true
      cache_key: "cpufetch-rs-{{ checksum \"Cargo.lock\" }}"
      mount:
        - .cargo-cache

  - name: fmt
    image: rust:1-slim
    environment:
      CARGO_HOME: /woodpecker/src/github.com/sm-moshi/cpufetch-rs/.cargo-cache
    commands:
      - rustup toolchain install nightly --profile minimal --component rustfmt --no-self-update
      - cargo +nightly fmt --all --check

  - name: clippy
    image: rust:1-slim
    environment:
      CARGO_HOME: /woodpecker/src/github.com/sm-moshi/cpufetch-rs/.cargo-cache
    commands:
      - rustup toolchain install beta --profile minimal --component clippy --no-self-update
      - cargo +beta clippy --all-targets --all-features -- -D warnings

  - name: test
    image: rust:1-slim
    environment:
      CARGO_HOME: /woodpecker/src/github.com/sm-moshi/cpufetch-rs/.cargo-cache
    commands:
      - rustup toolchain install beta --profile minimal --no-self-update
      - cargo +beta test --all-features

  - name: docs
    image: rust:1-slim
    environment:
      CARGO_HOME: /woodpecker/src/github.com/sm-moshi/cpufetch-rs/.cargo-cache
      RUSTDOCFLAGS: "-D warnings"
    commands:
      - cargo +stable doc --no-deps --document-private-items --all-features

  - name: rebuild-cache
    failure: ignore
    image: meltwater/drone-cache:v1.4.0@sha256:f4429bda3e4f2af2cceb40deee10b8cc5613aae7c8b08ad15c54109cad7fa9a3
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      rebuild: true
      cache_key: "cpufetch-rs-{{ checksum \"Cargo.lock\" }}"
      mount:
        - .cargo-cache
    when:
      - status: [success, failure]
