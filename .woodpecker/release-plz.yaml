# cpufetch-rs — Auto version bump pipeline
# Runs on every push to main. Uses release-plz to:
#   1. Analyse conventional commits since the last version tag
#   2. Bump Cargo.toml version accordingly
#   3. Create a git tag (e.g. v0.1.0) — this triggers the release pipeline
when:
  - event: push
    branch: main

steps:
  - name: restore-cache
    failure: ignore
    image: plugins/cache:1.10@sha256:bfcd289fbea93d4cd2baa0a9f2157a418ce692cd77f1bf21d6a23f13d3df4e2d
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      restore: true
      cache_key: "cpufetch-rs-{{ checksum \"Cargo.lock\" }}"
      mount:
        - .cargo-cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch

  - name: release-plz
    image: rust:1-slim
    environment:
      CARGO_HOME: /woodpecker/src/github.com/sm-moshi/cpufetch-rs/.cargo-cache
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apt-get update -o Acquire::ForceIPv4=true
      - apt-get install -y --no-install-recommends git curl ca-certificates
      - curl -fsSL https://github.com/release-plz/release-plz/releases/latest/download/release-plz-x86_64-unknown-linux-musl.tar.gz -o /tmp/rp.tar.gz
      - tar xzf /tmp/rp.tar.gz -C /usr/local/bin
      - chmod +x /usr/local/bin/release-plz
      - git config --global user.email "ci@m0sh1.cc"
      - git config --global user.name "Woodpecker CI"
      - git remote set-url origin "https://$GITHUB_TOKEN@github.com/sm-moshi/cpufetch-rs.git"
      - release-plz release --git-token "$GITHUB_TOKEN"
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch

  - name: rebuild-cache
    failure: ignore
    image: plugins/cache:1.10@sha256:bfcd289fbea93d4cd2baa0a9f2157a418ce692cd77f1bf21d6a23f13d3df4e2d
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      rebuild: true
      cache_key: "cpufetch-rs-{{ checksum \"Cargo.lock\" }}"
      mount:
        - .cargo-cache
    when:
      - status: [success, failure]
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch
