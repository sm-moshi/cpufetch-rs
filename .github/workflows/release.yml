name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
            name: freebsd-x86_64
            cross: true
          - target: aarch64-unknown-freebsd
            os: ubuntu-latest
            name: freebsd-aarch64
            cross: true
    runs-on: ${{ matrix.os }}
    env:
      # Safe: matrix.* and github.ref_name are repo-owner-controlled values
      TARGET: ${{ matrix.target }}
      NAME: ${{ matrix.name }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --locked --target "$TARGET"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar czvf "cpufetch-${TAG}-${NAME}.tar.gz" -C "target/${TARGET}/release" cpufetch
          sha256sum "cpufetch-${TAG}-${NAME}.tar.gz" > "cpufetch-${TAG}-${NAME}.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: 7z a "cpufetch-${TAG}-${NAME}.zip" "./target/${TARGET}/release/cpufetch.exe"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cpufetch-${{ matrix.name }}
          path: |
            cpufetch-*.tar.gz
            cpufetch-*.sha256
            cpufetch-*.zip

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: cpufetch-*
          generate_release_notes: true
